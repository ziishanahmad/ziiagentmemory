name: ziiagentmemory version: 0.8.1
description: "Persistent cross-session memory for OpenClaw via ZiiAgentMemory. 95.2% retrieval accuracy on LongMemEval-S."
author: "Rohit Ghumare"
homepage: "https://github.com/ziishanahmad/ziiagentmemory"
license: Apache-2.0

category: memory
tags:
  - memory
  - persistence
  - mcp
  - context

hooks:
  - on_session_start
  - on_pre_llm_call
  - on_post_tool_use
  - on_session_end

config:
  enabled: true
  base_url: http://localhost:3111
  token_budget: 2000
  min_confidence: 0.5
  fallback_on_error: true
  timeout_ms: 5000
