name: ziiagentmemory version: 0.8.0
description: "Persistent cross-session memory for Hermes Agent via ZiiAgentMemory. 95.2% retrieval accuracy on LongMemEval."
author: "Rohit Ghumare"
homepage: "https://github.com/ziishanahmad/ziiagentmemory"
hooks:
  - prefetch
